name: Vercel Deploy

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment information
        run: bunx vercel@latest pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build Vercel prebuilt output
        run: bunx vercel@latest build --token="${VERCEL_TOKEN}"

      - name: Deploy preview to Vercel
        run: bunx vercel@latest deploy --prebuilt --token="${VERCEL_TOKEN}"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment information
        run: bunx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel prebuilt output
        run: bunx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy production to Vercel
        run: bunx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
