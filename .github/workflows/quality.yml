name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Bun quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check source and tests
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Validate levels
        run: bun run levels:validate

      - name: Check unused code
        run: bun run knip

      - name: Build
        run: bun run build

      - name: Check bundle guardrails
        run: bun run bundle:check
