<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Space Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02040d;
    }
    body {
      position: relative;
    }
    #game-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
    #game-root {
      width: 100%;
      height: 100%;
    }
    #game-root > canvas {
      display: block;
    }
    #rotate-device-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 4, 13, 0.96);
      color: #f4f7ff;
      text-align: center;
      z-index: 10;
    }
    #rotate-device-overlay p {
      max-width: 18rem;
      font: 600 1.1rem/1.5 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: 0.02em;
    }
    @media (orientation: portrait) and (pointer: coarse) {
      #rotate-device-overlay {
        display: flex;
      }
      #game-root > canvas {
        visibility: hidden;
        pointer-events: none;
      }
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <div id="game-root"></div>
  </div>
  <div id="rotate-device-overlay" role="dialog" aria-live="polite">
    <p>Rotate your device to landscape to keep playing.</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
